name: "Pull Request - Semantic Lint"

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] validates PR metadata only through a pinned reusable workflow without checkout
    types:
      - opened
      - edited
      - synchronize

permissions: {}

jobs:
  main:
    uses: hoverkraft-tech/ci-github-common/.github/workflows/semantic-pull-request.yml@7034f6ae5bae1ec46a0108e8efb60d102e88961d # 0.37.2
    permissions:
      contents: write
      pull-requests: write
